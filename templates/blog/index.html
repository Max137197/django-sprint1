{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Блогикум — дневники, блоги, истории</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'blog:index' %}">Главная</a>
            <a href="{% url 'pages:about' %}">О проекте</a>
            <a href="{% url 'pages:rules' %}">Правила</a>
        </nav>
    </header>
    <main>
        {% for post in posts %}
        <article>
            <h2>
                <a href="{% url 'blog:post_detail' post.id %}">
                    {{ post.date }}
                </a>
            </h2>
            <p>
                <small>
                    Локация: {{ post.location }} | 
                    Категория: {{ post.category }}
                </small>
            </p>
            <p>{{ post.text|truncatewords:30 }}</p>
            <a href="{% url 'blog:post_detail' post.id %}">Читать далее</a>
        </article>
        {% endfor %}
    </main>
    <footer>
        <p>Блогикум © 2024</p>
    </footer>
</body>
</html>

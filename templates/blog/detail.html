{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ post.date }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
    <header class="navbar navbar-expand navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'blog:index' %}">Блогикум</a>
            <nav class="navbar-nav ms-auto">
                <a class="nav-link" href="{% url 'blog:index' %}">Лента записей</a>
                <a class="nav-link" href="{% url 'pages:about' %}">О проекте</a>
                <a class="nav-link" href="{% url 'pages:rules' %}">Наши правила</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <article>
            <h1 class="mb-3">{{ post.date }}</h1>
            <p class="text-muted mb-3">
                Локация: {{ post.location }} | Категория: {{ post.category }}
            </p>
            <div class="card mb-4">
                <div class="card-body">
                    <p class="card-text">{{ post.text }}</p>
                </div>
            </div>
            <a href="{% url 'blog:index' %}" class="btn btn-secondary">← На главную</a>
        </article>
    </main>
    
    <footer class="container mt-4 py-3 border-top">
        <p class="text-center mb-0">© Блогикум</p>
    </footer>
</body>
</html>

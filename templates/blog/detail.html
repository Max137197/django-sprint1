{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ post.date }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .header {
            background-color: #a8d0f0;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: bold;
            color: #333;
        }
        .nav-link {
            color: #555;
            padding: 0.5rem 1rem;
        }
        .nav-link.active {
            background-color: #4a90e2;
            color: white;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-3">
                    <a class="navbar-brand" href="{% url 'blog:index' %}">
                        <img src="{% static 'img/logo.png' %}" alt="Логотип" width="30" height="30">
                        Блогикум
                    </a>
                </div>
                <div class="col-9">
                    <nav class="nav justify-content-end">
                        <a class="nav-link" href="{% url 'blog:index' %}">Лента записей</a>
                        <a class="nav-link" href="{% url 'pages:about' %}">О проекте</a>
                        <a class="nav-link" href="{% url 'pages:rules' %}">Наши правила</a>
                    </nav>
                </div>
            </div>
        </div>
    </header>
    
    <main class="container">
        <article>
            <h1 class="mb-3">{{ post.date }}</h1>
            <ul class="list-unstyled mb-3">
                <li>Локация: {{ post.location }}</li>
                <li>Категория: {{ post.category }}</li>
            </ul>
            <div class="card mb-4">
                <div class="card-body">
                    <p class="card-text">{{ post.text }}</p>
                </div>
            </div>
            <a href="{% url 'blog:index' %}">← На главную</a>
        </article>
    </main>
    
    <footer class="container py-3 border-top">
        <p class="text-center mb-0">© Блогикум</p>
    </footer>
</body>
</html>

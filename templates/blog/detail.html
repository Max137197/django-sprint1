{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ post.date }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .header {
            background-color: #7eb3e8;
            padding: 0.75rem 0;
            margin-bottom: 2rem;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            color: #333;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .nav {
            display: flex;
            gap: 0.5rem;
            margin-left: 5rem;
        }
        .nav-link {
            color: #555;
            padding: 0.5rem 0.8rem;
            font-size: 0.95rem;
            text-decoration: none;
            border-radius: 4px;
        }
        .nav-link.active {
            background-color: #2174d4;
            color: white;
        }
        .nav-link:hover {
            color: #1a73e8;
        }
        .post-meta {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #e0e0e0;
        }
        .post-text {
            margin-bottom: 2rem;
            line-height: 1.8;
        }
        article a {
            color: #4a90e2;
        }
    </style>
</head>
<body>
    {% include 'includes/header.html' %}
    
    <main class="container">
        <article>
            <h1 class="mb-3">{{ post.date }}</h1>
            <div class="post-meta">
                <p class="mb-1">Локация: {{ post.location }}</p>
                <p class="mb-0">Категория: {{ post.category }}</p>
            </div>
            <div class="post-text">
                <p>{{ post.text }}</p>
            </div>
            <a href="{% url 'blog:index' %}">← На главную</a>
        </article>
    </main>
    
    {% include 'includes/footer.html' %}
</body>
</html>

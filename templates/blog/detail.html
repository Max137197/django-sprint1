{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ post.date }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'blog:index' %}">Главная</a>
        </nav>
    </header>
    <main>
        <article>
            <h1>{{ post.date }}</h1>
            <p><small>Локация: {{ post.location }} | Категория: {{ post.category }}</small></p>
            <p>{{ post.text }}</p>
            <a href="{% url 'blog:index' %}">← На главную</a>
        </article>
    </main>
</body>
</html>

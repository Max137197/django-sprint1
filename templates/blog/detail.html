{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>{{ post.date }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
</head>
<body>
    <header>
        <nav>
            <a href="{% url 'blog:index' %}">Лента записей</a>
            <a href="{% url 'pages:about' %}">О проекте</a>
            <a href="{% url 'pages:rules' %}">Наши правила</a>
        </nav>
    </header>
    <main>
        <h1>{{ post.date }}</h1>
        <p>Локация: {{ post.location }} | Категория: {{ post.category }}</p>
        <p>{{ post.text }}</p>
        <a href="{% url 'blog:index' %}">← На главную</a>
    </main>
    <footer>
        <p>© Блогикум</p>
    </footer>
</body>
</html>

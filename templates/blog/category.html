{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Категория {{ category_slug }} — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .header {
            background-color: #8ecae6;
            padding: 0.75rem 0;
            margin-bottom: 2rem;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            color: #333;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .nav {
            display: flex;
            gap: 0.5rem;
            margin-left: 5rem;
        }
        .nav-link {
            color: #666;
            padding: 0.5rem 0.8rem;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .nav-link.active {
            background-color: #4a90e2;
            color: white;
            border-radius: 4px;
        }
        .nav-link:hover {
            color: #333;
        }
        .category-title {
            text-align: center;
            margin-bottom: 2rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a class="navbar-brand" href="{% url 'blog:index' %}">
                <img src="{% static 'img/logo.png' %}" alt="Логотип" width="30" height="30">
                Блогикум
            </a>
            <nav class="nav">
                <a class="nav-link" href="{% url 'blog:index' %}">Лента записей</a>
                <a class="nav-link" href="{% url 'pages:about' %}">О проекте</a>
                <a class="nav-link" href="{% url 'pages:rules' %}">Наши правила</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <h1 class="category-title">Публикации в категории - {{ category_slug }}</h1>
    </main>
    
    <footer class="container py-3 border-top">
        <p class="text-center mb-0">© Блогикум</p>
    </footer>
</body>
</html>

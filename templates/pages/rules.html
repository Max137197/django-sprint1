{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <title>Наши правила — Блогикум</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <style>
        .header {
            background-color: #7eb3e8;
            padding: 0.75rem 0;
            margin-bottom: 2rem;
        }
        .header-container {
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1140px;
            margin: 0 auto;
            padding: 0 15px;
        }
        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal;
            color: #333;
            font-size: 1.1rem;
            text-decoration: none;
        }
        .nav {
            display: flex;
            gap: 0.5rem;
            margin-left: 5rem;
        }
        .nav-link {
            color: #555;
            padding: 0.5rem 0.8rem;
            font-size: 0.95rem;
            text-decoration: none;
        }
        .nav-link.active {
            color: #1a73e8;
            font-weight: 500;
        }
        .nav-link:hover {
            color: #1a73e8;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <a class="navbar-brand" href="{% url 'blog:index' %}">
                <img src="{% static 'img/logo.png' %}" alt="Логотип" width="30" height="30">
                Блогикум
            </a>
            <nav class="nav">
                <a class="nav-link" href="{% url 'blog:index' %}">Лента записей</a>
                <a class="nav-link" href="{% url 'pages:about' %}">О проекте</a>
                <a class="nav-link active" href="{% url 'pages:rules' %}">Наши правила</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <h1 class="mb-4">Наши правила</h1>
        <div class="card">
            <div class="card-body">
                <ol class="list-unstyled">
                    <li class="mb-2">1. Уважайте других пользователей.</li>
                    <li class="mb-2">2. Запрещено публиковать спам.</li>
                    <li class="mb-2">3. За нарушение правил аккаунт может быть заблокирован.</li>
                </ol>
            </div>
        </div>
    </main>
    
    <footer class="container py-3 border-top">
        <p class="text-center mb-0">© Блогикум</p>
    </footer>
</body>
</html>
